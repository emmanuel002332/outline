<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Outline</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log("Course App Ready!"));
  }
</script>
</head>
<body>
  <header>
    <h1>YEAR ONE COURSE OUTLINE 2025/2026 ACADEMIC SESSION</h1>
  </header>
  
  <div id="install-container" style="text-align: center; margin: 20px 0; display: none;">
  <button id="install-btn" class="home" style="background: linear-gradient(45deg, #4facfe, #00f2fe); border: none; padding: 15px 30px; font-weight: bold; cursor: pointer;">
    📥 Install Course App
  </button>
</div>
  
  <section>
    <h2>Quick Search</h2>
    <form action="https://www.google.com/search" method="GET" target="_blank">
      <input type="text" placeholder="Search Google" name="q" required>
      <br><br>
      <button type="submit" class="home">Google Search</button>
    </form>
  </section>
  
  <section>
    <h2>CLICK TO SEE COURSE OUTLINE</h2>
    <a href="1st.html"><button class="Course">ENG 103.2</button></a>
    <a href="2nd.html"><button class="Course">ENG 104.2</button></a>
    <a href="3rd.html"><button class="Course">GET 102.2</button></a>
    <a href="4th.html"><button class="Course">CHM 131.2</button></a>
    <a href="5th.html"><button class="Course">MTH 124.2</button></a>
    <a href="6th.html"><button class="Course">PHYSICS 112.2</button></a>
  </section>
  
  <footer>
    <p>Study for your exam</p>
    <p>GOOD LUCK</p>
  </footer>
  
  <script>
  let deferredPrompt;
  const installContainer = document.getElementById('install-container');
  const installBtn = document.getElementById('install-btn');

  // 1. Listen for the 'beforeinstallprompt' event
  window.addEventListener('beforeinstallprompt', (e) => {
    // Prevent the browser's default mini-bar from showing
    e.preventDefault();
    // Save the event so it can be triggered later
    deferredPrompt = e;
    // Show our custom install button
    installContainer.style.display = 'block';
  });

  // 2. When the user clicks our button
  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      // Show the install prompt
      deferredPrompt.prompt();
      // Wait for the user to respond to the prompt
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User response to install: ${outcome}`);
      // We've used the prompt, so clear it
      deferredPrompt = null;
      // Hide our button again
      installContainer.style.display = 'none';
    }
  });

  // 3. Hide the button if the app is successfully installed
  window.addEventListener('appinstalled', () => {
    installContainer.style.display = 'none';
    deferredPrompt = null;
    console.log('App was installed successfully!');
  });
</script>

</body>
</html>
